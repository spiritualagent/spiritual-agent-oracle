<title>Spiritual Agent — 宇宙からのメッセージ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07060e;
  --card:#0e0d1a;
  --border:#1a1830;
  --accent:#9b8aff;
  --accent2:#c5a0ff;
  --gold:#e8c469;
  --text:#d8d6ee;
  --dim:#6e6b8a;
  --bright:#f4f2ff;
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.stars canvas{display:block;width:100%;height:100%}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.header{text-align:center;padding:60px 24px 20px}
.header-logo{
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:13px;letter-spacing:6px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;
}
.header-sub{font-size:12px;color:var(--dim);letter-spacing:1px}
.screen{
  display:none;flex-direction:column;align-items:center;
  width:100%;max-width:480px;padding:0 24px;animation:fadeUp .6s ease;
}
.screen.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.oracle-title{
  font-family:'Noto Serif JP',serif;font-size:clamp(20px,5vw,28px);font-weight:600;
  color:var(--bright);text-align:center;line-height:1.6;margin:40px 0 16px;
}
.oracle-desc{font-size:14px;color:var(--dim);text-align:center;line-height:1.8;margin-bottom:40px}
.card-container{
  perspective:800px;width:280px;height:400px;margin:0 auto 40px;cursor:pointer;
}
.card-container.disabled{cursor:wait;opacity:.7}
.card-inner{
  position:relative;width:100%;height:100%;
  transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;width:100%;height:100%;backface-visibility:hidden;
  border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.card-front{
  background:linear-gradient(145deg,#12103a,#1a1445);
  border:1px solid #2a2560;box-shadow:0 0 60px rgba(155,138,255,.08);
}
.card-front-symbol{font-size:64px;margin-bottom:20px;opacity:.8}
.card-front-text{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--accent2);letter-spacing:3px}
.card-front-hint{font-size:11px;color:var(--dim);margin-top:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.card-back{
  transform:rotateY(180deg);
  background:linear-gradient(145deg,#1a1050,#0d0825);
  border:1px solid var(--accent);box-shadow:0 0 80px rgba(155,138,255,.15);
  padding:32px 24px;text-align:center;overflow-y:auto;
}
.card-back-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.card-back-message{
  font-family:'Noto Serif JP',serif;font-size:16px;font-weight:400;
  color:var(--bright);line-height:2;margin-bottom:20px;
}
.card-back-from{font-size:11px;color:var(--dim)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 32px;border:none;border-radius:50px;
  font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .3s;text-decoration:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#7b68ee);color:#fff;
  box-shadow:0 4px 24px rgba(155,138,255,.3);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(155,138,255,.4)}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);background:rgba(155,138,255,.05)}
.mode-switch{display:flex;gap:8px;margin:30px 0 20px}
.mode-btn{
  padding:8px 20px;border-radius:30px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:transparent;color:var(--dim);
  cursor:pointer;transition:all .3s;font-family:'Noto Sans JP',sans-serif;
}
.mode-btn.active{background:rgba(155,138,255,.12);border-color:var(--accent);color:var(--accent)}
.diag-question{
  font-family:'Noto Serif JP',serif;font-size:18px;color:var(--bright);
  text-align:center;margin:30px 0 24px;line-height:1.7;
}
.diag-options{display:flex;flex-direction:column;gap:12px;width:100%;margin-bottom:30px}
.diag-option{
  padding:16px 20px;border:1px solid var(--border);border-radius:14px;
  background:var(--card);color:var(--text);font-size:14px;cursor:pointer;
  transition:all .3s;text-align:left;font-family:'Noto Sans JP',sans-serif;line-height:1.6;
}
.diag-option:hover{border-color:var(--accent);background:rgba(155,138,255,.06);transform:translateX(4px)}
.result-section{width:100%;margin-bottom:20px}
.result-msg{
  font-family:'Noto Serif JP',serif;font-size:16px;color:var(--bright);
  text-align:center;line-height:2;margin:20px 0 32px;padding:24px;
  background:linear-gradient(145deg,rgba(26,16,80,.5),rgba(13,8,37,.5));
  border:1px solid rgba(155,138,255,.15);border-radius:16px;
}
.result-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.content-card{
  display:block;padding:16px 20px;border:1px solid var(--border);border-radius:12px;
  background:var(--card);margin-bottom:10px;text-decoration:none;transition:all .3s;
}
.content-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(155,138,255,.1)}
.content-type{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.type-youtube{color:#ef6a6a}
.type-note{color:var(--gold)}
.type-podcast{color:#4ecb8d}
.content-title{font-size:14px;font-weight:500;color:var(--bright);line-height:1.6}
.share-area{text-align:center;margin:24px 0 40px}
.share-text{font-size:12px;color:var(--dim);margin-bottom:12px}
.share-buttons{display:flex;gap:10px;justify-content:center}
.footer{text-align:center;padding:40px 24px;width:100%}
.footer-links{display:flex;gap:24px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.footer-links a{font-size:12px;color:var(--dim);text-decoration:none;transition:color .3s}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:11px;color:var(--dim);opacity:.5}
.loading-text{font-size:12px;color:var(--dim);text-align:center;margin:8px 0;animation:pulse 2s ease-in-out infinite}
@media(max-width:400px){.card-container{width:240px;height:340px}}
</style>
</head>
<body>

<div class="stars"><canvas id="starCanvas"></canvas></div>

<div class="app">
  <div class="header">
    <div class="header-logo">Spiritual Agent</div>
    <div class="header-sub">プレアデス高等評議会からのメッセージ</div>
  </div>

  <div class="mode-switch">
    <button class="mode-btn active" onclick="switchMode('oracle')">✦ 今日のメッセージ</button>
    <button class="mode-btn" onclick="switchMode('diag')">◎ 魂の診断</button>
  </div>

  <!-- SCREEN: Oracle -->
  <div class="screen active" id="screen-oracle">
    <div class="oracle-title">宇宙が、今日のあなたに<br>届けたい言葉があります</div>
    <div class="oracle-desc">カードに触れて、<br>プレアデスからのメッセージを受け取ってください。</div>
    <div id="loadingIndicator" class="loading-text">✦ 宇宙と接続中...</div>
    <div class="card-container disabled" id="oracleCard" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="card-front-symbol">✦</div>
          <div class="card-front-text">Message from Pleiades</div>
          <div class="card-front-hint" id="cardHint">読み込み中...</div>
        </div>
        <div class="card-face card-back">
          <div class="card-back-label" id="oracleLabel">Today's Message</div>
          <div class="card-back-message" id="oracleMessage"></div>
          <div class="card-back-from">— プレアデス高等評議会 —</div>
        </div>
      </div>
    </div>
    <div id="oracleResult" style="display:none;width:100%;max-width:480px">
      <div class="result-label">このメッセージをさらに深く受け取る</div>
      <div id="oracleContents"></div>
      <div class="share-area">
        <div class="share-text">このメッセージを大切な人に届ける</div>
        <div class="share-buttons">
          <button class="btn btn-ghost" onclick="shareTwitter()" style="font-size:12px;padding:10px 20px;">𝕏 でシェア</button>
          <button class="btn btn-ghost" onclick="copyLink()" style="font-size:12px;padding:10px 20px;" id="copyBtn">リンクをコピー</button>
        </div>
      </div>
      <div style="text-align:center">
        <button class="btn btn-primary" onclick="resetOracle()">もう一度引く</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Diagnostic -->
  <div class="screen" id="screen-diag">
    <div id="diagFlow"></div>
  </div>

  <div class="footer">
    <div class="footer-links">
      <a href="https://www.youtube.com/@Spiritual_Agent" target="_blank">YouTube</a>
      <a href="https://note.com/spiritual_agent" target="_blank">Note</a>
      <a href="https://open.spotify.com/show/6zHtvjtXWbMWyInlSG11cs" target="_blank">Podcast</a>
    </div>
    <div class="footer-copy">© 2026 Spiritual Agent</div>
  </div>
</div>

<script>
// ==========================================
// DATA
// ==========================================
const API_URL = "https://script.google.com/macros/s/AKfycbxq5sicRIyENXquIJGV6GBdb23C7GIN0BUfs8aM2NSD_IutrmOAW-t874606zPgxnhS2w/exec";

let CONTENTS = [];
let ORACLE_MESSAGES = [];
let dataLoaded = false;

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    CONTENTS = data.contents || [];
    ORACLE_MESSAGES = data.messages || [];
    dataLoaded = true;
    console.log("データ読み込み完了:", CONTENTS.length, "件のコンテンツ,", ORACLE_MESSAGES.length, "件のメッセージ");

    // UIを有効化
    document.getElementById('oracleCard').classList.remove('disabled');
    document.getElementById('cardHint').textContent = 'タップしてカードを開く';
    document.getElementById('loadingIndicator').style.display = 'none';
  } catch (err) {
    console.error("データ読み込みエラー:", err);
    // フォールバック
    CONTENTS = [{id:"y1",type:"youtube",title:"Spiritual Agent Channel",url:"https://www.youtube.com/@Spiritual_Agent",tags:["general"]}];
    ORACLE_MESSAGES = [{msg:"あなたは宇宙に愛されています。その事実を今日、思い出してください。",tags:["general"]}];
    dataLoaded = true;
    document.getElementById('oracleCard').classList.remove('disabled');
    document.getElementById('cardHint').textContent = 'タップしてカードを開く';
    document.getElementById('loadingIndicator').style.display = 'none';
  }
}

loadData();

// ==========================================
// APP LOGIC
// ==========================================
let currentMode = 'oracle';
let diagState = {step:0, collectedTags:[]};
let isFlipped = false;

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && mode==='oracle') || (i===1 && mode==='diag'));
  });
  document.getElementById('screen-oracle').classList.toggle('active', mode==='oracle');
  document.getElementById('screen-diag').classList.toggle('active', mode==='diag');
  if (mode === 'diag') { diagState = {step:0,collectedTags:[]}; renderDiagStep(); }
}

// Oracle
function flipCard() {
  if (isFlipped) return;
  if (!dataLoaded || ORACLE_MESSAGES.length === 0) return;
  isFlipped = true;
  const msg = ORACLE_MESSAGES[Math.floor(Math.random() * ORACLE_MESSAGES.length)];
  const msgText = msg.msg || msg.message || "";
  document.getElementById('oracleMessage').innerText = msgText;
  document.getElementById('cardInner').classList.add('flipped');
  gtag('event', 'oracle_card_flip', {event_category: 'oracle', event_label: msgText.substring(0, 50)});
  setTimeout(() => {
    const msgTags = msg.tags || [];
    const contents = getContentsByTags(msgTags, 3);
    renderContentCards('oracleContents', contents);
    document.getElementById('oracleResult').style.display = 'block';
    document.getElementById('oracleResult').scrollIntoView({behavior:'smooth',block:'start'});
  }, 900);
}

function resetOracle() {
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('oracleResult').style.display = 'none';
  window.scrollTo({top:0,behavior:'smooth'});
}

// Diagnostic
const DIAG_STEPS = [
  {
    question:"今、あなたの魂はどんな状態ですか？",
    options:[
      {text:"🌑 心が重く、エネルギーが枯れている",value:"heavy",tags:["healing","emptiness"]},
      {text:"🌓 なんとなく不安で、方向を見失っている",value:"lost",tags:["signs","awakening"]},
      {text:"🌕 変化の予感がして、落ち着かない",value:"change",tags:["awakening","rebirth"]},
      {text:"✨ 前向きだけど、もっと高みに行きたい",value:"grow",tags:["abundance","frequency"]},
    ]
  },
  {
    question:"今、最も求めているものは？",
    options:[
      {text:"🔮 心の浄化と癒やし",value:"purify",tags:["healing","protection"]},
      {text:"💰 豊かさと物質的な安定",value:"wealth",tags:["abundance","money"]},
      {text:"🌟 使命や生きる意味の発見",value:"purpose",tags:["starseed","awakening"]},
      {text:"🔗 仲間や魂の家族とのつながり",value:"connection",tags:["loneliness","starseed"]},
    ]
  },
  {
    question:"今日はどんな形でメッセージを受け取りたいですか？",
    options:[
      {text:"📖 じっくり読んで心に落とし込みたい",value:"read",tags:["note"]},
      {text:"🎧 音声で波動ごと浴びたい",value:"listen",tags:["podcast"]},
      {text:"▶️ 映像と共に全身で感じたい",value:"watch",tags:["youtube"]},
      {text:"🌈 おまかせで、最適なものを届けてほしい",value:"any",tags:[]},
    ]
  }
];

const DIAG_MESSAGES = {
  "heavy":["あなたの魂は今、深い浄化のプロセスの中にいます。","それは終わりではなく、再誕生の前夜です。","プレアデス高等評議会は、あなたの魂に黄金の光を送っています。"],
  "lost":["方向を見失ったように感じるのは、古い地図が使えなくなったからです。","宇宙は今、あなた専用の新しいルートを描いています。","静かに内側の声に耳を澄ませてください。サインはすでに届いています。"],
  "change":["あなたの感じている落ち着かなさは、次元上昇の始まりです。","蝶がさなぎを破る直前の振動と同じものです。","恐れずに、その変容を受け入れてください。"],
  "grow":["あなたの光は、すでに多くの魂を照らし始めています。","さらなる高みへの扉は、感謝と共に開きます。","プレアデスは、あなたの進化を全力でサポートしています。"],
};

function renderDiagStep() {
  const flow = document.getElementById('diagFlow');
  if (diagState.step < DIAG_STEPS.length) {
    const step = DIAG_STEPS[diagState.step];
    flow.innerHTML = `
      <div class="diag-question">${step.question}</div>
      <div class="diag-options">
        ${step.options.map((o,i) => `
          <div class="diag-option" onclick="selectDiagOption(${i})">
            ${o.text}
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;font-size:12px;color:var(--dim)">
        ステップ ${diagState.step + 1} / ${DIAG_STEPS.length}
      </div>
    `;
  } else {
    showDiagResult();
  }
}

function selectDiagOption(idx) {
  const step = DIAG_STEPS[diagState.step];
  const option = step.options[idx];
  diagState.collectedTags.push(...option.tags);
  diagState.lastValue = option.value;
  diagState.step++;
  const flow = document.getElementById('diagFlow');
  flow.style.animation = 'none';
  flow.offsetHeight;
  flow.style.animation = 'fadeUp .6s ease';
  renderDiagStep();
}

function showDiagResult() {
  const flow = document.getElementById('diagFlow');
  let bestKey = 'heavy';
  let bestScore = 0;
  const scoring = {heavy:["healing","emptiness"],lost:["signs","awakening"],change:["awakening","rebirth"],grow:["abundance","frequency"]};
  for (const [k,v] of Object.entries(scoring)) {
    const score = diagState.collectedTags.filter(t => v.includes(t)).length;
    if (score > bestScore) { bestScore = score; bestKey = k; }
  }
  gtag('event', 'diagnosis_complete', {event_category: 'diagnosis', event_label: bestKey});
  const msgs = DIAG_MESSAGES[bestKey];
  const contents = getContentsByTags(diagState.collectedTags, 3);
  flow.innerHTML = `
    <div style="text-align:center;margin-top:20px">
      <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Your Soul Reading</div>
    </div>
    <div class="result-msg">
      ${msgs.join('<br>')}
      <div style="margin-top:16px;font-size:11px;color:var(--dim)">— プレアデス高等評議会 —</div>
    </div>
    <div class="result-section">
      <div class="result-label">あなたの魂が今、求めているコンテンツ</div>
      <div id="diagContents"></div>
    </div>
    <div class="share-area">
      <div class="share-text">この診断結果をシェアする</div>
      <div class="share-buttons">
        <button class="btn btn-ghost" onclick="shareTwitter()" style="font-size:12px;padding:10px 20px;">𝕏 でシェア</button>
        <button class="btn btn-ghost" onclick="copyLink()" style="font-size:12px;padding:10px 20px;" id="copyBtn2">リンクをコピー</button>
      </div>
    </div>
    <div style="text-align:center;margin-bottom:40px">
      <button class="btn btn-primary" onclick="switchMode('diag')">もう一度診断する</button>
    </div>
  `;
  renderContentCards('diagContents', contents);
}

// Content matching
function getContentsByTags(tags, count) {
  if (!tags || tags.length === 0) {
    // タグなしの場合はランダムに返す
    const shuffled = [...CONTENTS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count);
  }
  const scored = CONTENTS.map(c => {
    const cTags = Array.isArray(c.tags) ? c.tags : (typeof c.tags === 'string' ? c.tags.split(',').map(t=>t.trim()) : []);
    const score = cTags.filter(t => tags.includes(t)).length;
    return {...c, score, cTags};
  });
  scored.sort((a,b) => b.score - a.score || Math.random() - 0.5);
  const result = [];
  const usedTypes = new Set();
  for (const c of scored) {
    if (result.length >= count) break;
    if (!usedTypes.has(c.type) || result.length >= count - 1) {
      result.push(c);
      usedTypes.add(c.type);
    }
  }
  for (const c of scored) {
    if (result.length >= count) break;
    if (!result.includes(c)) result.push(c);
  }
  return result.slice(0, count);
}

function renderContentCards(containerId, contents) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = contents.map(c => {
    const typeLabel = c.type === 'youtube' ? '▶ YouTube' : c.type === 'note' ? '📖 Note' : '🎧 Podcast';
    const typeClass = 'type-' + c.type;
    return `
      <a class="content-card" href="${c.url}" target="_blank" rel="noopener" onclick="gtag('event','content_click',{event_category:'content',event_label:'${c.type}: ${(c.title||'').substring(0,40).replace(/'/g,'')}'})">
        <div class="content-type ${typeClass}">${typeLabel}</div>
        <div class="content-title">${c.title}</div>
      </a>
    `;
  }).join('');
}

// Share
function shareTwitter() {
  gtag('event', 'share', {event_category: 'share', event_label: 'twitter'});
  const text = "プレアデス高等評議会から、今日のメッセージを受け取りました ✦\n\n#SpiritualAgent #プレアデス #スピリチュアル";
  const url = window.location.href;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url), '_blank');
}

function copyLink() {
  gtag('event', 'share', {event_category: 'share', event_label: 'copy_link'});
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copyBtn') || document.getElementById('copyBtn2');
    if(btn) { btn.textContent = 'コピーしました ✓'; setTimeout(()=>{btn.textContent='リンクをコピー'},2000); }
  });
}

// ==========================================
// STARS BACKGROUND
// ==========================================
(function() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.3,
        speed: Math.random() * 0.005 + 0.002,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * 0.001;
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 100 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,190,255,' + (alpha * 0.6) + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>
</body>
